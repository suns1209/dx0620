<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday DX</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:black;
    overflow:hidden;
}

/* 封面 */
#cover{
    width:100%;
    height:100vh;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
}

#cover button{
    padding:12px 25px;
    font-size:20px;
    border:none;
    border-radius:30px;
    cursor:pointer;
}

/* 主页面 */
#main{
    display:none;
    width:100%;
    height:100vh;
    position:relative;
    color:white;
    text-align:center;
}

/* 背景 */
.bg{
    position:absolute;
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
    opacity:0;
    transition:1s;
}

.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.45);
}

.content{
    position:relative;
    z-index:2;
    top:18%;
}

.cake{
    font-size:90px;
    cursor:pointer;
    user-select:none;
    transition:.3s;
}

.cake:hover{
    transform:scale(1.1);
}

#text{
    width:85%;
    margin:auto;
    margin-top:20px;
}

.line{
    display:block;
    font-size:20px;
    margin:6px 0;
}

/* 图片弹窗 */
#photoModal{
    display:none;
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.85);
    justify-content:center;
    align-items:center;
    z-index:999;
}

#birthdayPhoto{
    max-width:90%;
    max-height:85%;
    border-radius:15px;
    box-shadow:0 0 30px rgba(255,255,255,.4);
    animation:zoom .5s;
}

@keyframes zoom{
    from{
        transform:scale(.5);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}
</style>
</head>

<body>

<!-- 音乐 -->
<audio id="bgm" loop preload="none">
    <source src="music.mp3">
</audio>

<!-- 封面 -->
<div id="cover">
    <h1>🎂 Happy Birthday</h1>
    <button onclick="start()">DD</button>
</div>

<!-- 主页面 -->
<div id="main">

    <div class="bg" id="bg"></div>
    <div class="overlay"></div>

    <div class="content">
        <h1>Happy Birthday 🎉</h1>

        <div class="cake" onclick="cakeClick()">
            🎂
        </div>

        <div id="text"></div>
    </div>

</div>

<!-- 图片弹窗 -->
<div id="photoModal" onclick="closePhoto()">
    <img src="photo.webp" id="birthdayPhoto">
</div>

<script>

const msg=[
"丁丁，生日快乐 🎉",
"工作顺利，烦恼少少。",
"希望你年年岁岁，",
"都能看到新的风景。",
"遇见更多爱你的人，",
"自由尽兴，身体健康。",
"------小孙 ❤️"
];

let i=0;

/* 启动 */
function start(){

    document.getElementById("cover").style.display="none";
    document.getElementById("main").style.display="block";

    const bgm=document.getElementById("bgm");

    bgm.load();

    bgm.play().catch(()=>{
        console.log("等待用户允许播放");
    });

    setTimeout(()=>{
        const bg=document.getElementById("bg");
        bg.style.backgroundImage="url(bg.webp)";
        bg.style.opacity="1";
    },100);

    typeLine();
}

/* 打字效果 */
function typeLine(){

    if(i>=msg.length) return;

    let line=document.createElement("div");
    line.className="line";

    document.getElementById("text").appendChild(line);

    let j=0;

    function typing(){

        if(j<msg[i].length){

            line.textContent+=msg[i][j];

            j++;

            setTimeout(typing,85);

        }else{

            i++;

            setTimeout(typeLine,500);

        }

    }

    typing();
}

/* 点击蛋糕 */
function cakeClick(){

    const cake=document.querySelector(".cake");

    cake.innerHTML="🕯️🎂";

    document.getElementById("photoModal").style.display="flex";
}

/* 关闭图片 */
function closePhoto(){

    document.getElementById("photoModal").style.display="none";
}
</script>

</body>
</html>
