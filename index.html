<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday DX</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:black;
    overflow:hidden;
}

/* 封面（零资源加载） */
#cover{
    width:100%;
    height:100vh;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
}

/* 主页面 */
#main{
    display:none;
    width:100%;
    height:100vh;
    color:white;
    text-align:center;
    position:relative;
}

/* 背景（延迟加载） */
.bg{
    position:absolute;
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
    opacity:0;
    transition:1s;
}

/* 遮罩 */
.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.45);
}

/* 内容 */
.content{
    position:relative;
    top:20%;
}

/* 蛋糕 */
.cake{
    font-size:90px;
}

/* 字幕 */
#text{
    width:80%;
    margin:auto;
}

.line{
    display:block;
    font-size:20px;
    margin:6px 0;
}
</style>
</head>

<body>

<!-- 🎵 音乐（延迟加载） -->
<audio id="bgm" loop preload="none">
    <source src="music.mp3">
</audio>

<!-- 封面 -->
<div id="cover">
    <h1>🎂 Happy Birthday</h1>
    <button onclick="start()">DD</button>
</div>

<!-- 主页面 -->
<div id="main">

    <div class="bg" id="bg"></div>
    <div class="overlay"></div>

    <div class="content">
        <h1>Happy Birthday 🎉</h1>

        <div class="cake" onclick="cakeClick()">🎂✨</div>

        <div id="text"></div>
    </div>

</div>

<script>

/* 文案 */
const msg=[
"丁丁，生日快乐 🎉",
"工作顺利，烦恼少少。",
"希望你年年岁岁，",
"都能看到新的风景。",
"遇见更多爱你的人，",
"自由尽兴，身体健康。",
"------小孙 ❤️"
];

let i=0;
let started=false;

/* 🚀 启动 */
function start(){

    document.getElementById("cover").style.display="none";
    document.getElementById("main").style.display="block";

    /* ⭐ 音乐延迟加载 */
    const bgm=document.getElementById("bgm");
    bgm.load();
    bgm.play().catch(()=>{});

    /* ⭐ 背景延迟加载（关键优化） */
    setTimeout(()=>{
        document.getElementById("bg").style.backgroundImage="url(bg.jpg)";
        document.getElementById("bg").style.opacity="1";
    },100);

    typeLine();
}

/* ✍️ 字幕 */
function typeLine(){

    if(i >= msg.length) return;

    let line=document.createElement("div");
    line.className="line";
    document.getElementById("text").appendChild(line);

    let j=0;

    function typing(){
        if(j < msg[i].length){
            line.textContent += msg[i][j];
            j++;
            setTimeout(typing,85);
        }else{
            i++;
            setTimeout(typeLine,500);
        }
    }

    typing();
}

/* 🎂 蛋糕 */
function cakeClick(){
    document.querySelector(".cake").innerHTML="🎂💖";
}

</script>

</body>
</html>
